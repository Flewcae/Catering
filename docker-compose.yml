services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: catering-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  user-db:
    image: postgres:17-alpine
    container_name: catering-user-db
    environment:
      POSTGRES_DB: catering_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catering-user-db-data:/var/lib/postgresql/data

  notification-db:
    image: postgres:17-alpine
    container_name: catering-notification-db
    environment:
      POSTGRES_DB: catering_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - catering-notification-db-data:/var/lib/postgresql/data

  center-db:
    image: postgres:17-alpine
    container_name: catering-center-db
    environment:
      POSTGRES_DB: catering_centers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - catering-center-db-data:/var/lib/postgresql/data

  user-api:
    build:
      context: .
      dockerfile: src/Services/User/Catering.UserService.Api/Dockerfile
    container_name: catering-user-api
    ports:
      - "5101:8080"
    environment:
      ConnectionStrings__UserDb: "Host=user-db;Port=5432;Database=catering_users;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:29092"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: "${JWT_SECRET:-Catering-Dev-Super-Secret-Key-For-JWT-Signing-2026-DO-NOT-USE-IN-PRODUCTION!}"
      Jwt__Issuer: "${JWT_ISSUER:-Catering.UserService}"
      Jwt__Audience: "${JWT_AUDIENCE:-Catering.Clients}"
    depends_on:
      - user-db
      - kafka

  notification-api:
    build:
      context: .
      dockerfile: src/Services/Notification/Catering.NotificationService.Api/Dockerfile
    container_name: catering-notification-api
    ports:
      - "5102:8080"
    environment:
      ConnectionStrings__NotificationDb: "Host=notification-db;Port=5432;Database=catering_notifications;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:29092"
      ASPNETCORE_ENVIRONMENT: Development
      Smtp__Host: "${SMTP_HOST:-}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-true}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Catering}"
      Firebase__ProjectId: "${FIREBASE_PROJECT_ID:-}"
      Firebase__CredentialsJson: "${FIREBASE_CREDENTIALS_JSON:-}"
      Jwt__Secret: "${JWT_SECRET:-Catering-Dev-Super-Secret-Key-For-JWT-Signing-2026-DO-NOT-USE-IN-PRODUCTION!}"
      Jwt__Issuer: "${JWT_ISSUER:-Catering.UserService}"
      Jwt__Audience: "${JWT_AUDIENCE:-Catering.Clients}"
    depends_on:
      - notification-db
      - kafka

  center-api:
    build:
      context: .
      dockerfile: src/Services/Center/Catering.CenterService.Api/Dockerfile
    container_name: catering-center-api
    ports:
      - "5103:8080"
    environment:
      ConnectionStrings__CenterDb: "Host=center-db;Port=5432;Database=catering_centers;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:29092"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: "${JWT_SECRET:-Catering-Dev-Super-Secret-Key-For-JWT-Signing-2026-DO-NOT-USE-IN-PRODUCTION!}"
      Jwt__Issuer: "${JWT_ISSUER:-Catering.UserService}"
      Jwt__Audience: "${JWT_AUDIENCE:-Catering.Clients}"
    depends_on:
      - center-db
      - kafka

volumes:
  catering-user-db-data:
  catering-notification-db-data:
  catering-center-db-data:
